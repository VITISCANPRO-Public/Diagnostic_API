# ==============================================================================
#              CI/CD Pipeline — Vitiscan Diagnostic API
#   Runs integration tests, then deploys to HuggingFace Spaces if tests pass
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [trigger-test]
  workflow_dispatch:

# ── Job 1: Integration Tests ─────────────────────────────────────────────────

jobs:
  tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run integration tests
        env:
          TESTING: "true"
        run: pytest tests/test_api_integration.py -v

  # ── Job 2: Deploy to HuggingFace Spaces ──────────────────────────────────

  deploy:
    name: Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://MouniaT:${HF_TOKEN}@huggingface.co/spaces/MouniaT/VITISCANPRO_DIAGNO_API
          git push hf main --force