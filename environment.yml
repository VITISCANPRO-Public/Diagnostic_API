
name: vitiscan_api_diagno
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  
  # PyTorch with CUDA
  - pytorch>=2.5.0
  - torchvision>=0.20.0
  
  # MLflow and tracking
  - mlflow=3.7.0
  - protobuf>=5.29.0
  - cloudpickle>=3.1.0
  - pyarrow>=18.0.0
  
 # Scientific dependencies
  - numpy>=1.26.0

  # Utils
  - pyyaml>=6.0
  - pillow>=10.0.0
  - requests>=2.31.0

  # API
  - fastapi[standard]
  - uvicorn
  - python-multipart
  - pydantic
  - boto3
  - s3fs
  - pytest>=8.0.0
  - httpx>=0.27.0